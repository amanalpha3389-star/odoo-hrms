<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave | HRMS</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <h2>HRMS</h2>

            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li id="employeesNav">
                    <a href="employees.html">👥 Employees</a>
                </li>
                <li id="attendanceNav">
                    <a href="attendance.html">🕒 Attendance</a>
                </li>
                <li id="leaveNav">
                    <a href="leave.html">📅 Leave</a>
                </li>
                <li id="payrollNav">
                    <a href="payroll.html">💰 Payroll</a>
                </li>
                <li id="profileNav">
                    <a href="profile.html">👤 Profile</a>
                </li>
                <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
            </ul>

        </aside>

        <main class="content">

            <h1>Leave Management</h1>

            <form id="leaveForm">

                <select id="leaveEmployee" required>
                    <option value="">Select Employee</option>
                </select>

                <input type="text" id="leaveReason" placeholder="Reason" required>

                <input type="date" id="leaveStart" required>

                <input type="date" id="leaveEnd" required>

                <button type="submit">
                    Apply Leave
                </button>

            </form>

            <table id="leaveTable">

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Reason</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </main>

    </div>

    <script src="app.js"></script>

</body>

</html>
