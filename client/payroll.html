<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll | HRMS</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <h2>HRMS</h2>

            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="employees.html">👥 Employees</a></li>
                <li><a href="attendance.html">🕒 Attendance</a></li>
                <li><a href="leave.html">📅 Leave</a></li>
                <li><a href="payroll.html">💰 Payroll</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
                <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
            </ul>

        </aside>

        <main class="content">

            <h1>Payroll Management</h1>

            <form id="payrollForm">

                <select id="payEmployee" required>
                    <option value="">Select Employee</option>
                </select>

                <input type="number" id="salary" placeholder="Basic Salary" required>

                <input type="number" id="bonus" placeholder="Bonus" required>

                <input type="number" id="deduction" placeholder="Deduction" required>

                <button type="submit">
                    Generate Payroll
                </button>

            </form>

            <table id="payrollTable">

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Salary</th>
                        <th>Bonus</th>
                        <th>Deduction</th>
                        <th>Net Salary</th>
                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </main>

    </div>

    <script src="app.js"></script>

</body>

</html>
